<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — BAT YAM Capacity</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supa-config.js"></script>
<style>
  :root{--bg:#0f1830;--card:#16233f;--line:#243657;--orange:#ef5b25;--txt:#eaf0ff;--mut:#8ea3c9;--red:#e74c3c;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);min-height:100vh;font-family:'Heebo',-apple-system,sans-serif;color:var(--txt);padding:22px}
  .wrap{max-width:1000px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
  h1{font-size:22px;font-weight:800}h1 span{color:var(--orange)}
  .actions a,.actions button{font-family:inherit;font-size:13px;font-weight:700;border-radius:9px;padding:9px 14px;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:#1b2b4d;color:var(--txt);margin-inline-start:8px}
  .stat{display:inline-flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 18px;margin-inline-end:10px}
  .stat b{font-size:22px;color:var(--orange)}.stat span{font-size:12px;color:var(--mut)}
  .stats{margin-bottom:18px}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  th,td{padding:12px 14px;text-align:right;font-size:14px;border-bottom:1px solid var(--line)}
  th{background:#1b2b4d;color:var(--mut);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#18274a}
  .name{font-weight:700}
  .email{color:var(--mut);font-size:13px;direction:ltr;text-align:right}
  .badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#1a8f4c33;color:#7ee2a8;font-weight:700}
  .badge.admin{background:#ef5b2533;color:#ff9f7a}
  .del{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 12px;font:700 12px/1 inherit;font-family:inherit;cursor:pointer}
  .del:hover{background:var(--red);color:#fff}
  .muted{color:var(--mut);font-size:13px}
  .empty{text-align:center;padding:40px;color:var(--mut)}
  #err{background:#2a1215;color:#ff8a80;padding:12px;border-radius:10px;margin-bottom:14px;display:none;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span>ADMIN</span> · ניטור משתמשים</h1>
    <div class="actions">
      <a href="app.html">→ לאפליקציה</a>
      <button id="refresh">רענן</button>
      <button id="signout">התנתק</button>
    </div>
  </header>
  <div id="err"></div>
  <div class="stats" id="stats"></div>
  <div id="content"><p class="muted">טוען…</p></div>
</div>

<script>
  var sb = window.supabase.createClient(window.SUPA_URL, window.SUPA_ANON_KEY);
  var meId = null;
  function err(t){ var e=document.getElementById("err"); e.textContent=t; e.style.display="block"; }
  function fmtDate(s){ if(!s) return "—"; try{ return new Date(s).toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"2-digit"});}catch(e){return "—";} }
  function fmtWhen(s){ if(!s) return "—"; try{ var d=new Date(s), n=new Date(); var diff=(n-d)/86400000;
    if(diff<1) return "היום"; if(diff<2) return "אתמול"; if(diff<7) return Math.floor(diff)+" ימים";
    return fmtDate(s);}catch(e){return "—";} }

  async function guard(){
    var s = await sb.auth.getSession();
    if(!(s.data && s.data.session)){ location.replace("index.html"); return false; }
    meId = s.data.session.user.id;
    var p = await sb.from("profiles").select("is_admin").eq("id", meId).maybeSingle();
    if(!(p.data && p.data.is_admin)){
      document.getElementById("content").innerHTML =
        '<div class="empty">אין לך הרשאת Admin.<br><br><a href="app.html" style="color:#ef5b25">← חזרה לאפליקציה</a></div>';
      return false;
    }
    return true;
  }

  async function load(){
    var profs = await sb.from("profiles").select("id,name,email,is_admin,welcome_seen,created_at");
    if(profs.error){ err("שגיאה בטעינת משתמשים: "+profs.error.message); return; }
    var board  = await sb.from("board").select("user_id,results,updated_at");
    var states = await sb.from("states").select("user_id,updated_at");

    var bMap={}, sMap={};
    (board.data||[]).forEach(function(r){ bMap[r.user_id]=r; });
    (states.data||[]).forEach(function(r){ sMap[r.user_id]=r; });

    var users = (profs.data||[]).sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
    var total = users.length;
    var active = users.filter(function(u){ return sMap[u.id]; }).length;

    document.getElementById("stats").innerHTML =
      '<span class="stat"><b>'+total+'</b><span>נרשמו</span></span>'+
      '<span class="stat"><b>'+active+'</b><span>התחילו למלא</span></span>';

    if(!users.length){ document.getElementById("content").innerHTML='<div class="empty">אין עדיין משתמשים.</div>'; return; }

    var rows = users.map(function(u){
      var b=bMap[u.id], s=sMap[u.id];
      var logged = b && b.results ? Object.keys(b.results).length : 0;
      var last = s ? s.updated_at : (b ? b.updated_at : null);
      var isMe = u.id===meId;
      return '<tr>'+
        '<td class="name">'+(u.name||"—")+(u.is_admin?' <span class="badge admin">Admin</span>':'')+(isMe?' <span class="muted">(אתה)</span>':'')+'</td>'+
        '<td class="email">'+(u.email||"—")+'</td>'+
        '<td>'+fmtDate(u.created_at)+'</td>'+
        '<td>'+fmtWhen(last)+'</td>'+
        '<td>'+logged+'</td>'+
        '<td>'+(isMe?'<span class="muted">—</span>':'<button class="del" data-id="'+u.id+'" data-name="'+(u.name||"")+'">מחק</button>')+'</td>'+
      '</tr>';
    }).join("");

    document.getElementById("content").innerHTML =
      '<table><thead><tr><th>שם</th><th>אימייל</th><th>נרשם</th><th>פעילות אחרונה</th><th>אימונים</th><th></th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table>'+
      '<p class="muted" style="margin-top:12px">מחיקה מסירה את הנתונים ואת המשתמש מהלוח. כדי למחוק גם את חשבון ההתחברות עצמו — Supabase → Authentication → Users.</p>';

    Array.prototype.forEach.call(document.querySelectorAll(".del"), function(btn){
      btn.onclick = function(){ del(btn.getAttribute("data-id"), btn.getAttribute("data-name")); };
    });
  }

  async function del(uid, name){
    if(!confirm('למחוק את "'+(name||"המשתמש")+'"?\nכל הנתונים שלו יימחקו והוא יוסר מהלוח. פעולה זו לא הפיכה.')) return;
    try{
      await sb.from("board").delete().eq("user_id", uid);
      await sb.from("states").delete().eq("user_id", uid);
      await sb.from("profiles").delete().eq("id", uid);
      await load();
    }catch(e){ err("מחיקה נכשלה: "+(e.message||e)); }
  }

  document.getElementById("refresh").onclick = load;
  document.getElementById("signout").onclick = async function(){ await sb.auth.signOut(); location.replace("index.html"); };

  (async function(){ if(await guard()) load(); })();
</script>
</body>
</html>
